name: Sync Master to Develop

on:
  workflow_run:
    workflows: "Build & Distribute Ishari Android"
    types:
      - completed
    branches: [master]

jobs:
  sync-to-develop:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Penting: ambil seluruh history untuk merge
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge master into develop
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "→ Checkout develop branch"
          git checkout develop
          git pull origin develop

          echo "→ Merging master into develop"
          git merge origin/master --no-ff -m "chore: auto sync develop with master after version bump"

          echo "→ Pushing updated develop branch"
          git push origin develop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
