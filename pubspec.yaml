name: ishari
description: "Ishari app with Clean Architecture, Google Sign-In, and Supabase."
publish_to: "none"
version: 1.2.4+17

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1

  # Dependency injection
  get_it: ^9.2.1
  injectable: ^2.7.1

  # Functional programming (Either, Option)
  fpdart: ^1.1.0

  # @immutable annotation
  meta: ^1.17.0

  # Environment variables
  envied: ^1.0.0

  # Code generation annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Backend & Auth
  supabase_flutter: ^2.7.0
  google_sign_in: ^7.2.0
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0

  # Secure token storage
  flutter_secure_storage: ^10.0.0

  # User preferences (reader font size settings)
  shared_preferences: ^2.3.2

  # Network check
  internet_connection_checker_plus: ^2.5.1

  # Navigation
  go_router: ^17.1.0

  # Audio playback
  just_audio: ^0.10.0

  # Google Fonts (scheherazadeNew for Arabic text)
  google_fonts: ^8.0.2

  # Launch external URLs (WhatsApp, email)
  url_launcher: ^6.3.1

  # Render markdown content in notification detail
  flutter_markdown_plus: ^1.0.7

  # SVG rendering
  flutter_svg: ^2.0.10+1

  # Keep screen awake while app is in use
  wakelock_plus: ^1.2.10

  # Read app version & build number
  package_info_plus: ^9.0.1

  # AdMob ads
  google_mobile_ads: ^7.0.0

  # Logging
  logger: ^2.5.0

  # Crash reporting
  sentry_flutter: ^9.16.0

  # First-launch feature wizard / guided tour
  tutorial_coach_mark: ^1.2.11

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  very_good_analysis: ^10.2.0

  # Code generation
  build_runner: ^2.12.2
  envied_generator: ^1.0.0
  freezed: ^3.2.5
  injectable_generator: ^2.12.1
  json_serializable: ^6.13.0

  # Launcher icon generator
  flutter_launcher_icons: ^0.14.3

  # CI
  cider: ^0.2.10

  # Sentry debug symbol upload
  sentry_dart_plugin: ^2.3.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: 'assets/icons/ishari_launcher.png'
  min_sdk_android: 21
  adaptive_icon_background: '#111111'
  adaptive_icon_foreground: 'assets/icons/ishari_launcher.png'

sentry:
  upload_debug_symbols: true
  upload_source_maps: false
  project: flutter
  org: amar-q0
  auth_token: $SENTRY_AUTH_TOKEN
  wait_for_processing: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/intro/
    - assets/icons/
    - assets/fonts/
