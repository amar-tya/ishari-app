name: ishari
description: "Ishari app with Clean Architecture, Google Sign-In, and Supabase."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1

  # Dependency injection
  get_it: ^9.2.1
  injectable: ^2.7.1

  # Functional programming (Either, Option)
  fpdart: ^1.1.0

  # @immutable annotation
  meta: ^1.17.0

  # Environment variables
  envied: ^1.0.0

  # Code generation annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Backend & Auth
  supabase_flutter: ^2.7.0
  google_sign_in: ^6.2.1

  # Secure token storage
  flutter_secure_storage: ^10.0.0

  # User preferences (reader font size settings)
  shared_preferences: ^2.3.2

  # Network check
  internet_connection_checker_plus: ^2.5.1

  # Navigation
  go_router: ^17.1.0

  # Audio playback
  just_audio: ^0.10.0

  # Google Fonts (scheherazadeNew for Arabic text)
  google_fonts: ^6.2.1

  # Launch external URLs (WhatsApp, email)
  url_launcher: ^6.3.1

  # SVG rendering
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  very_good_analysis: ^10.2.0

  # Code generation
  build_runner: ^2.12.2
  envied_generator: ^1.0.0
  freezed: ^3.2.5
  injectable_generator: ^2.12.1
  json_serializable: ^6.13.0

  # Launcher icon generator
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: 'assets/icons/ishari_launcher.png'
  min_sdk_android: 21
  adaptive_icon_background: '#111111'
  adaptive_icon_foreground: 'assets/icons/ishari_launcher.png'

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/intro/
    - assets/icons/
