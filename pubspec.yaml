name: ishari
description: "Ishari app with Clean Architecture, Google Sign-In, and Supabase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6

  # Dependency injection
  get_it: ^7.7.0
  injectable: ^2.4.4

  # Functional programming (Either, Option)
  fpdart: ^1.1.0

  # @immutable annotation
  meta: ^1.17.0

  # Code generation annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Backend & Auth
  supabase_flutter: ^2.7.0
  google_sign_in: ^6.2.1

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Network check
  internet_connection_checker_plus: ^2.5.1

  # Navigation
  go_router: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  very_good_analysis: ^7.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  injectable_generator: ^2.6.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true
